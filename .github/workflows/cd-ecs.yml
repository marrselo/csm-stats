name: Build and Deploy to ECS

on:
  push:
    branches:
      - main 

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, Push to ECR and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # - name: Download task definition
      #   run: |
      #     aws ecs describe-task-definition \
      #     --task-definition TaskDef_csm-stats \
      #     --query taskDefinition > task-definition-prod.json

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: stats
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker run --rm --privileged tonistiigi/binfmt --install all
          docker buildx build --platform linux/arm64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest . --push
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: TaskDef_csm-stats
          # task-definition: task-definition-prod.json
          container-name: Containercsm-stats
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            LOG_LEVEL=info
            BUILD_ID=${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: csm-stats-fargate
          cluster: cross-cluster
          wait-for-service-stability: false